      - name: Sprint Leader at PyCon HK 2025 - frame-check @ City University of Hong Kong
        url: https://github.com/lucianosrp/frame-check
        summary: Leading an open-source sprint at PyCon Hong Kong 2025 for frame-check, a Python static analysis tool that validates DataFrame schemas and column access at development time.
