{% extends "base.html" %}
{% block content %}
<section class="posts">
  <h1>{{ section.title }}</h1>
  <ul>
    {% for page in section.pages %}
    <li>
      <a href="{{ page.permalink | safe }}">{{ page.title }}</a>
      <time datetime="{{ page.date }}">{{ page.date | date(format="%Y-%m-%d") }}</time>
    </li>
    {% endfor %}
  </ul>
</section>
{% endblock %}
